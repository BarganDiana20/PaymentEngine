<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/user-style.css">
</head>

<body>
<div class="mobile-container">
    <div class="profile-header">
        <h2 class="profile-title">My Profile</h2>
    </div>
    <button onclick="history.back()" class="profile-back-btn">← Back</button>

    <div class = "profile-content">
        <div class="profile-card">
        <div class="profile-avatar">
            <i class="fa-solid fa-circle-user profile-icon"></i>
            <h3 id="profileFullName" style="color:white;">User Name</h3>
        </div>

        <div class="profile-info">
            <div class="profile-row">
                <span class="profile-label">Username:</span>
                <span id="profileUsername" style="color:white; font-size: 14px; font-weight: bold;"></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Email:</span>
                <span id="profileEmail" style="color:white; font-size: 14px; font-weight: bold;"></span>
            </div>
        </div>
        </div>
    </div>

    <div class="tab-bar">
            <button class="tab-btn" id="dashboardTab">
                <i class='fa-solid fa-house' style='font-size:14px'></i>Dashboard</button>
            <button class="tab-btn" id="paymentTab"> 
                <i class='fa-solid fa-money-bill-transfer' style='font-size:14px'></i>New Payment</button>
            <button class="tab-btn" id="walletsTab">
                <i class='fa-solid fa-wallet' style='font-size:14px'></i> Wallets </button>
            <button class="tab-btn" id = "logoutBtn"> 
            <i class='fa-solid fa-right-from-bracket' style='font-size:14px'></i> Logout</button>
    </div>

</div>

<script src="js/profile.js"></script>

</body>
</html>
