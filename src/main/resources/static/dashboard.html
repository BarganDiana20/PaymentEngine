<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PayEngine Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/user-style.css">
</head>
<body>

<div class="mobile-container">
    <div class="dashboard-header">
        <div class="user-section hello-wrapper" id="profileBtn">
            <i class="fa-solid fa-circle-user user-icon"  style="color: #ffe600; font-size: 30px;"></i>
            <span class="hello-text" id="greeting-text">Hello, User!</span>
            <i class="fa-solid fa-chevron-down chevron-down"></i>
        </div>
    </div>

    <div class="dashboard-content">
        <div id="wallet-info"></div>
    </div>

    <!-- TAB BAR -->
     <div class="tab-bar">
        <button class="tab-btn" id="dashboardTab">
            <i class='fa-solid fa-house' style='font-size:14px'></i>Dashboard</button>
        <button class="tab-btn" id="paymentTab"> 
            <i class='fa-solid fa-money-bill-transfer' style='font-size:14px'></i>New Payment</button>
        <button class="tab-btn" id="walletsTab">
            <i class='fa-solid fa-wallet' style='font-size:14px'></i> Wallets </button>
        <button class="tab-btn" id = "logoutBtn"> 
            <i class='fa-solid fa-right-from-bracket' style='font-size:14px'></i> Logout</button>
    </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
